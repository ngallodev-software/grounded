services:

  postgres:
    image: postgres:17
    container_name: grounded-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: grounded
      POSTGRES_USER: grounded
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grounded_pg_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U grounded -d grounded" ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"
    cap_drop: [ ALL ]
    cap_add: [ CHOWN, DAC_OVERRIDE, FOWNER, SETUID, SETGID ]
    security_opt: [ no-new-privileges:true ]

  api:
    build:
      context: .
      dockerfile: Grounded.Api/Dockerfile
    container_name: grounded-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__AnalyticsDatabase: >-
        Host=postgres;Port=5432;Database=grounded;Username=grounded;Password=${POSTGRES_PASSWORD}
      GROUNDED_PLANNER_API_KEY: ${GROUNDED_PLANNER_API_KEY}
      GROUNDED_PLANNER_MODEL: ${GROUNDED_PLANNER_MODEL:-gpt-4o-mini}
      GROUNDED_PLANNER_BASE_URL: ${GROUNDED_PLANNER_BASE_URL:-https://api.openai.com/v1/}
      GROUNDED_PLANNER_TIMEOUT_SECONDS: ${GROUNDED_PLANNER_TIMEOUT_SECONDS:-15}
      GROUNDED_SYNTHESIS_API_KEY: ${GROUNDED_SYNTHESIS_API_KEY}
      GROUNDED_SYNTHESIS_MODEL: ${GROUNDED_SYNTHESIS_MODEL:-gpt-4o-mini}
      GROUNDED_REPLAY_MODE: ${GROUNDED_REPLAY_MODE:-false}
      GROUNDED_PLANNER_PROMPT_VERSION: ${GROUNDED_PLANNER_PROMPT_VERSION:-v2}
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "127.0.0.1:5252:5252"
    cap_drop: [ ALL ]
    cap_add: [ NET_BIND_SERVICE ]
    security_opt: [ no-new-privileges:true ]

  ui:
    build:
      context: ./grounded-ui
      dockerfile: Dockerfile
      args:
        # Empty string → relative URLs → nginx proxies /analytics to api
        # Cloudflare Tunnel terminates TLS at the edge; the UI container also serves TLS on 443 internally.
        VITE_API_BASE_URL: ""
        VITE_BASE_PATH: "/"
    container_name: grounded-ui
    restart: unless-stopped
    depends_on:
      - api
    cap_drop: [ ALL ]
    cap_add: [ NET_BIND_SERVICE, CHOWN, SETUID, SETGID, DAC_OVERRIDE ]
    security_opt: [ no-new-privileges:true ]
    volumes:
      - /etc/cloudflare/origin/ngallodev-software.uk.pem:/etc/nginx/certs/tls.crt:ro
      - /etc/cloudflare/origin/ngallodev-software.uk.key:/etc/nginx/certs/tls.key:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: grounded-cloudflared
    restart: unless-stopped
    depends_on:
      - ui
    # Cloudflare terminates TLS at the edge.
    # Tunnel traffic should reach the nginx UI container over HTTPS on 443, and nginx proxies /analytics/* to the api container.
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    cap_drop: [ ALL ]
    security_opt: [ no-new-privileges:true ]

volumes:
  grounded_pg_data:
