server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Use the incoming Host header in any 301 redirects nginx generates
    # (prevents redirects to 127.0.0.1 when behind Cloudflare tunnel)
    absolute_redirect off;

    # Security headers
    add_header X-Content-Type-Options    "nosniff"                    always;
    add_header X-Frame-Options           "DENY"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

    # Use Docker's internal DNS resolver so upstream is resolved per-request,
    # not at nginx startup (prevents crash when api container isn't up yet).
    resolver 127.0.0.11 valid=10s;

    location /grounded/analytics/ {
        set $upstream http://api:5252;
        rewrite ^/grounded(/analytics/.*)$ $1 break;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Also handle direct /analytics/ calls (local dev via port-forward)
    location /analytics/ {
        set $upstream http://api:5252;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Redirect bare /grounded to /grounded/ (no trailing slash → 301)
    location = /grounded {
        return 301 /grounded/;
    }

    # SPA served under /grounded/
    location /grounded/ {
        try_files $uri /grounded/index.html;
    }

    # SPA fallback — all non-asset routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
