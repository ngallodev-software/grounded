server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Use the incoming Host header in any 301 redirects nginx generates
    # (prevents redirects to 127.0.0.1 when behind Cloudflare tunnel)
    absolute_redirect off;

    # Security headers
    add_header X-Content-Type-Options    "nosniff"                    always;
    add_header X-Frame-Options           "DENY"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' cloudflareinsights.com; frame-ancestors 'none';" always;

    # Use Docker's internal DNS resolver so upstream is resolved per-request,
    # not at nginx startup (prevents crash when api container isn't up yet).
    resolver 127.0.0.11 valid=10s;

    location /analytics/ {
        set $upstream http://api:5252;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri /index.html;
    }
}
